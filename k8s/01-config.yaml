# ConfigMap: variaveis nao sensiveis e URLs especificas do ambiente k8s.
# As URLs OAuth diferem do docker-compose porque os portos NodePort
# mapeados pelo k3d sao 28000/28180/25173 (e nao 18000/8180/5173).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcc-config
  namespace: tcc-sso
data:
  DJANGO_DEBUG: "false"
  POSTGRES_DB: tcc_sso
  POSTGRES_USER: tcc
  # OAUTH_ISSUER = URL publica (vai na claim 'iss' do token)
  OAUTH_ISSUER: http://localhost:28180/realms/tcc
  # OAUTH_INTERNAL = como o backend alcanca o keycloak DENTRO do cluster
  OAUTH_INTERNAL: http://keycloak.tcc-sso.svc.cluster.local:8080/realms/tcc
  OAUTH_CLIENT_ID: tcc-backend
  OAUTH_REDIRECT_URI: http://localhost:28000/api/auth/callback
  FRONTEND_URL: http://localhost:25173
---
# Secret: credenciais e chaves.
# Para o TCC mantemos os valores em texto plano aqui — em producao real
# usariamos sealed-secrets ou external-secrets-operator com um vault.
apiVersion: v1
kind: Secret
metadata:
  name: tcc-secrets
  namespace: tcc-sso
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "dev-django-secret-troque-em-producao"
  JWT_SECRET: "dev-jwt-secret-troque-em-producao"
  POSTGRES_PASSWORD: "tcc_dev_password"
  OAUTH_CLIENT_SECRET: tcc-backend-secret
