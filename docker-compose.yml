# Orquestra todos os serviços do projeto para rodar localmente.
# Doppler injeta os segredos via variáveis de ambiente em tempo de execução.
# Uso: doppler run -- docker compose up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Backend só sobe depois que o Postgres estiver aceitando conexões
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "true"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      # Volume anônimo para preservar node_modules instalados na imagem
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  zap:
    # OWASP ZAP em modo daemon — o pipeline aponta para http://zap:8080
    # api.disablekey=true simplifica o uso em ambiente local/CI controlado
    image: zaproxy/zap-stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true
    ports:
      - "8090:8080"

volumes:
  pgdata:
