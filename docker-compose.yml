# Orquestra todos os serviços do projeto para rodar localmente.
# Segredos vêm do arquivo .env na raiz (não versionado).
# Uso: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Backend só sobe depois que o Postgres estiver aceitando conexões
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      # DATABASE_URL é montada aqui pois depende de outras vars do .env
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app
    ports:
      # Host 18000 para evitar conflito com outros projetos que usam 8000
      - "18000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      # Volume anônimo para preservar node_modules instalados na imagem
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  zap:
    # OWASP ZAP em modo daemon — o pipeline aponta para http://zap:8080
    # api.disablekey=true simplifica o uso em ambiente local/CI controlado
    image: zaproxy/zap-stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true
    ports:
      - "8090:8080"

volumes:
  pgdata:
